<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Admin</title>

<style>

body{
font-family:Arial;
background:#f1f5f9;
padding:40px;
}

.card{
background:white;
padding:30px;
border-radius:12px;
width:500px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

input{
padding:10px;
border-radius:8px;
border:1px solid #ddd;
margin-right:10px;
}

button{
padding:10px 20px;
background:#2563eb;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

td,th{
border-bottom:1px solid #ddd;
padding:10px;
}

</style>

</head>

<body>

<div class="card">

<h2>Admin Panel</h2>

<h3>Hodim qo'shish</h3>

<input placeholder="Ism">

<input placeholder="Email">

<button>Qo'shish</button>

<table>

<tr>
<th>Hodim</th>
<th>Status</th>
</tr>

<tr>
<td>Ali</td>
<td>Ishda</td>
</tr>

</table>

</div>

</body>
</html>
