  <script>
async function checkOfficeIP() {
  const allowedIP = "185.203.239.27";

  try {
    const res = await fetch("https://api.ipify.org?format=json");

    if (!res.ok) {
      console.warn("IP service ishlamadi");
      return;
    }

    const data = await res.json();

    if (data.ip !== allowedIP) {
      document.body.innerHTML = `
        <div style="font-family:Arial,sans-serif; text-align:center; margin-top:100px;">
          <h2>Ruxsat yo‘q</h2>
          <p>Bu tizimga faqat ishxona tarmog‘idan kirish mumkin.</p>
        </div>
      `;
      throw new Error("IP blocked");
    }
  } catch (error) {
    console.warn("IP tekshirish ishlamadi:", error);
  }
}

async function login(){
  try{

    const email=document.getElementById("email").value.trim()
    const password=document.getElementById("password").value.trim()

    if(!email||!password){
      alert("Email va parol kiriting")
      return
    }

    const {error}=await sb.auth.signInWithPassword({
      email,
      password
    })

    if(error){
      alert(error.message)
      return
    }

    const profile=await getMyProfile()

    if(!profile){
      alert("Profil topilmadi")
      return
    }

    if(profile.role==="admin"){
      location.href="admin.html"
    }else{
      location.href="employee.html"
    }

  } catch (err) {
    alert("Profilni olishda xatolik yuz berdi");
    console.error(err);
  }
}

checkOfficeIP();
</script>
