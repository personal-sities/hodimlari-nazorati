<!DOCTYPE html>
<html>

<h2>Hodim paneli</h2>

<button onclick="startWork()">Ishni boshlash</button>

<button id="lunchBtn" onclick="lunch()">Tushlik boshlash</button>

<button onclick="finishWork()">Ishni yakunlash</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

const supabase = window.supabase.createClient(
"sb_publishable_cOaIZv2uOu16ix7YJx3T_A_BXI-Vdb5",
"sb_secret_QpDXkO3TeW7RiULA8xJ8hw_EJwz2jIR"
)

let sessionId=null
let lunchStarted=false

async function startWork(){

const {data:user}=await supabase.auth.getUser()

let now=new Date()

let workStart=new Date()
workStart.setHours(9,0,0,0)

let late=0

if(now>workStart){
late=Math.floor((now-workStart)/60000)
}

const {data}=await supabase
.from("work_sessions")
.insert({
employee_id:user.user.id,
date:new Date(),
start_time:now,
late_minutes:late
})
.select()

sessionId=data[0].id

alert("Ish boshlandi")

}

async function lunch(){

if(!lunchStarted){

await supabase
.from("work_sessions")
.update({lunch_start:new Date()})
.eq("id",sessionId)

document.getElementById("lunchBtn").innerText="Tushlikni tugatish"

lunchStarted=true

}else{

await supabase
.from("work_sessions")
.update({lunch_end:new Date()})
.eq("id",sessionId)

document.getElementById("lunchBtn").innerText="Tushlik boshlash"

lunchStarted=false

}

}

async function finishWork(){

await supabase
.from("work_sessions")
.update({end_time:new Date()})
.eq("id",sessionId)

alert("Ish tugadi")

}

</script>

</html>
